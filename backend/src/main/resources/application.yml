spring:
  datasource:
    url: jdbc:h2:mem:guestblur
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

app:
  jwt:
    secret: Y2xhdWRlLWNvZGUtZ3Vlc3QtYmx1ci1zZWNyZXQta2V5LWZvci1kZXZlbG9wbWVudC1vbmx5LTIwMjQ=
    expiration-ms: 86400000

server:
  port: 8080
